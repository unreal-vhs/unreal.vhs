<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNREAL.VHS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="crt"></div>
    <div class="scanlines"></div>

    <div id="boot-screen" class="boot-screen">
        <div class="boot-text" id="boot-text"></div>
    </div>

    <div id="terminal" class="terminal hidden">
        <div id="output" class="output"></div>
        <div class="input-line">
            <span class="prompt">unreal@vhs:~$&nbsp;</span>
            <input type="text" id="input" class="input" autofocus autocomplete="off" spellcheck="false">
            <span class="cursor" id="cursor">▊</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
